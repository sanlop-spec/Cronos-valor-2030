name: Build Android APK

on:
  push:
    branches:
      - actualizacion
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Set up JDK 17 (Requerido para Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor
        run: |
          mkdir -p www
          cp -r index.html css js manifest.json www/ 2>/dev/null || true
          npx cap add android
          npx cap sync

      - name: Build APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CronosValor-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
